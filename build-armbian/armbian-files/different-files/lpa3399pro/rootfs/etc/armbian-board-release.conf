# Board-specific overrides sourced by rebuild make_image() before truncate.
# LPA3399Pro needs larger root than default 3000MiB (NPU fw + modules + optional RKNN).
adjust_kernel_files="yes"
root_mb="12288"
boot_mb="512"

adjust_kernel_files_cmd() {
    install -Dm644 "${tag_rootfs}/usr/lib/lpa3399pro/rk3399pro-neardi-linux-lc110-base.dtb" \
        "${tag_bootfs}/dtb/rockchip/rk3399pro-neardi-linux-lc110-base.dtb"

    # Mirror modules short-name alias if rebuild generic path missed it
    local kn mod_short
    kn="$(ls -1 "${tag_rootfs}/usr/lib/modules" 2>/dev/null | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
    if [[ -n "${kn}" ]]; then
        mod_short="$(echo "${kn}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
        if [[ -n "${mod_short}" && "${mod_short}" != "${kn}" && ! -e "${tag_rootfs}/usr/lib/modules/${mod_short}" ]]; then
            ln -sfn "${kn}" "${tag_rootfs}/usr/lib/modules/${mod_short}"
        fi
    fi
}
