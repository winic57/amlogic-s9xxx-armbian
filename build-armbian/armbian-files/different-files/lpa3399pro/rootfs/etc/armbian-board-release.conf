# Board-specific overrides sourced by rebuild make_image() before truncate.
# LPA3399Pro needs larger root than default 3000MiB (NPU fw + modules + optional RKNN).
# boot_mb=300: kernel~48MiB + dtb/extlinux; leave rest of media to root (p2 starts earlier).
# rebuild validates boot_mb >= 256.
adjust_kernel_files="yes"
root_mb="12288"
boot_mb="300"

adjust_kernel_files_cmd() {
    local lib_dtb="${tag_rootfs}/usr/lib/lpa3399pro"
    local boot_dtb="${tag_bootfs}/dtb/rockchip"
    mkdir -p "${boot_dtb}"

    # Safety base (display disabled) kept for recovery as *-nodisplay.dtb
    if [[ -f "${lib_dtb}/rk3399pro-neardi-linux-lc110-base.dtb" ]]; then
        install -Dm644 "${lib_dtb}/rk3399pro-neardi-linux-lc110-base.dtb" \
            "${boot_dtb}/rk3399pro-neardi-linux-lc110-base-nodisplay.dtb"
    fi

    # Default boot DTB: display-subsystem + VOP enabled (GPU still disabled)
    if [[ -f "${lib_dtb}/rk3399pro-neardi-linux-lc110-base-display-conservative.dtb" ]]; then
        install -Dm644 "${lib_dtb}/rk3399pro-neardi-linux-lc110-base-display-conservative.dtb" \
            "${boot_dtb}/rk3399pro-neardi-linux-lc110-base-display-conservative.dtb"
        # Historical base name also points at display so old fdtfile= still works
        install -Dm644 "${lib_dtb}/rk3399pro-neardi-linux-lc110-base-display-conservative.dtb" \
            "${boot_dtb}/rk3399pro-neardi-linux-lc110-base.dtb"
    elif [[ -f "${lib_dtb}/rk3399pro-neardi-linux-lc110-base.dtb" ]]; then
        install -Dm644 "${lib_dtb}/rk3399pro-neardi-linux-lc110-base.dtb" \
            "${boot_dtb}/rk3399pro-neardi-linux-lc110-base.dtb"
    fi

    # Mirror modules short-name alias if rebuild generic path missed it
    local kn mod_short
    kn="$(ls -1 "${tag_rootfs}/usr/lib/modules" 2>/dev/null | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
    if [[ -n "${kn}" ]]; then
        mod_short="$(echo "${kn}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
        if [[ -n "${mod_short}" && "${mod_short}" != "${kn}" && ! -e "${tag_rootfs}/usr/lib/modules/${mod_short}" ]]; then
            ln -sfn "${kn}" "${tag_rootfs}/usr/lib/modules/${mod_short}"
        fi
    fi

    # Ensure HDMI units are enabled even if wants/ links were dropped by packaging
    mkdir -p "${tag_rootfs}/etc/systemd/system/multi-user.target.wants"
    ln -sfn ../lpa-hdmi-unblank.service \
        "${tag_rootfs}/etc/systemd/system/multi-user.target.wants/lpa-hdmi-unblank.service" 2>/dev/null || true
    ln -sfn ../lpa-hdmi-clock-fix.service \
        "${tag_rootfs}/etc/systemd/system/multi-user.target.wants/lpa-hdmi-clock-fix.service" 2>/dev/null || true
}
